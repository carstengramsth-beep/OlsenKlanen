
<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OlsenKlanen — Log ind</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family: Georgia, serif;
    background:#1B4332;
    color:#f5d76e;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  .login-boks {
    text-align:center;
    padding:40px;
    max-width:420px;
    width:90%;
  }
  .logo {
    width:160px;
    height:160px;
    margin:0 auto 20px;
    display:block;
    border-radius:12px;
  }
  h1 {
    color:#f5d76e;
    font-size:2rem;
    margin-bottom:8px;
    letter-spacing:2px;
  }
  .undertekst {
    color:#c9b96e;
    font-style:italic;
    margin-bottom:30px;
    font-size:0.95rem;
  }
  .felt {
    width:100%;
    padding:14px 16px;
    font-size:1.1rem;
    font-family:inherit;
    border:1px solid #f5d76e;
    background:rgba(255,255,255,0.05);
    color:#fff;
    border-radius:4px;
    margin-bottom:14px;
    text-align:center;
    letter-spacing:1px;
  }
  .felt:focus { outline:none; border-color:#fff; background:rgba(255,255,255,0.1); }
  .felt::placeholder { color:#a89860; }
  .knap {
    width:100%;
    padding:14px;
    font-size:1.1rem;
    font-family:inherit;
    background:#f5d76e;
    color:#1B4332;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-weight:bold;
    letter-spacing:1px;
  }
  .knap:hover { background:#fff; }
  .besked {
    margin-top:16px;
    min-height:24px;
    font-size:0.95rem;
    color:#ff9999;
  }
  .besked.ok { color:#90ee90; }
  .gaest-link {
    margin-top:20px;
    font-size:0.85rem;
  }
  .gaest-link a {
    color:#c9b96e;
    text-decoration:underline;
    cursor:pointer;
  }
  .hjaelp {
    margin-top:24px;
    font-size:0.78rem;
    color:#8a7d4a;
    line-height:1.5;
  }
</style>
</head>
<body>

<div class="login-boks">
  <img src="icon-512.png" alt="OlsenKlanen logo" class="logo">
  <h1>OlsenKlanen</h1>
  <div class="undertekst">Familieside</div>

  <input type="email" id="email" class="felt" placeholder="Din email" autofocus>
  <input type="password" id="kode" class="felt" placeholder="Din kode">
  <button class="knap" onclick="logInd()">Log ind</button>

  <div id="besked" class="besked"></div>

  <div class="gaest-link">
    <a onclick="logIndSomGaest()">Log ind som gæst</a>
  </div>

  <div class="hjaelp">
    OlsenBanden bruger fælleskoden indtil videre.<br>
    Egen kode kan vælges senere.
  </div>
</div>

<script>
  // Login-system — version v19.5 — 13. maj 2026
  // OlsenBanden (5 personer) bruger fælleskoden Olsen26 + egen email
  // Gæster bruger gæste-linket

  // ---- OLSENBANDEN ----
  const OLSENBANDEN = [
    { email: "cg@gallerieg.dk",     navn: "Carsten Gram",          rettighed: "admin" },
    { email: "tvo@ishoejby.dk",     navn: "Tommy Vormslev Olsen",  rettighed: "olsenbanden" },
    { email: "kurt@vormslev.dk",    navn: "Kurt Olsen",            rettighed: "olsenbanden" },
    { email: "safi@dr.dk",          navn: "Sanne Gram Fadel",      rettighed: "olsenbanden" },
    { email: "kld@inmobia.com",     navn: "Karin Lund",            rettighed: "olsenbanden" }
  ];

  const FAELLESKODE = "Olsen26";

  function logInd() {
    const email   = document.getElementById("email").value.trim().toLowerCase();
    const kode    = document.getElementById("kode").value.trim();
    const besked  = document.getElementById("besked");

    if (!email || !kode) {
      besked.textContent = "Skriv både email og kode.";
      besked.className = "besked";
      return;
    }

    // Find personen
    const person = OLSENBANDEN.find(p => p.email.toLowerCase() === email);

    if (!person) {
      besked.textContent = "Email ikke fundet. Tjek stavning.";
      besked.className = "besked";
      return;
    }

    // Tjek kode
    if (kode !== FAELLESKODE) {
      besked.textContent = "Forkert kode.";
      besked.className = "besked";
      return;
    }

    // Login OK
    besked.textContent = "Velkommen, " + person.navn + "!";
    besked.className = "besked ok";
    gemAdgang(person.rettighed, person.navn, person.email);
    videreTil("forside.html");
  }

  function logIndSomGaest() {
    const besked = document.getElementById("besked");
    besked.textContent = "Velkommen — du er logget ind som gæst.";
    besked.className = "besked ok";
    gemAdgang("gaest", "Gæst", "");
    videreTil("forside.html");
  }

  function gemAdgang(niveau, navn, email) {
    try {
      sessionStorage.setItem("ok_niveau", niveau);
      sessionStorage.setItem("ok_navn", navn);
      sessionStorage.setItem("ok_email", email);
    } catch(e) { /* fortsætter alligevel */ }
  }

  function videreTil(side) {
    setTimeout(function() { window.location.href = side; }, 800);
  }

  // Enter-tast
  document.getElementById("kode").addEventListener("keydown", function(e) {
    if (e.key === "Enter") logInd();
  });
  document.getElementById("email").addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("kode").focus();
  });
</script>

</body>
</html>
