<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OlsenKlanen — Log ind</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B4332">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family: Georgia, serif;
    background:#1B4332;
    color:#f5d76e;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  .login-boks {
    text-align:center;
    padding:40px;
    max-width:420px;
    width:90%;
  }
  .logo {
    width:160px;
    height:160px;
    margin:0 auto 20px;
    display:block;
    border-radius:12px;
  }
  h1 {
    color:#f5d76e;
    font-size:2rem;
    margin-bottom:8px;
    letter-spacing:2px;
  }
  .undertekst {
    color:#c9b96e;
    font-style:italic;
    margin-bottom:30px;
    font-size:0.95rem;
  }
  .felt {
    width:100%;
    padding:14px 16px;
    font-size:1.1rem;
    font-family:inherit;
    border:1px solid #f5d76e;
    background:rgba(255,255,255,0.05);
    color:#fff;
    border-radius:4px;
    margin-bottom:14px;
    text-align:center;
    letter-spacing:1px;
  }
  .felt:focus { outline:none; border-color:#fff; background:rgba(255,255,255,0.1); }
  .felt::placeholder { color:#a89860; }

  /* PIN-feltet med forstørrelsesglas */
  .kode-wrapper {
    position:relative;
    margin-bottom:14px;
  }
  .kode-wrapper .felt {
    margin-bottom:0;
    padding-right:48px;
  }
  .vis-kode {
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    background:transparent;
    border:none;
    color:#f5d76e;
    cursor:pointer;
    font-size:1.3rem;
    padding:8px;
    border-radius:4px;
  }
  .vis-kode:hover { background:rgba(245,215,110,0.1); }

  /* Knap-række (Log ind + Fortryd) */
  .knap-raekke {
    display:flex;
    gap:10px;
    margin-top:6px;
  }
  .knap {
    flex:1;
    padding:14px;
    font-size:1.1rem;
    font-family:inherit;
    background:#f5d76e;
    color:#1B4332;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-weight:bold;
    letter-spacing:1px;
  }
  .knap:hover { background:#fff; }
  .knap:disabled { opacity:0.5; cursor:wait; }
  .knap-fortryd {
    background:transparent;
    color:#f5d76e;
    border:1px solid #f5d76e;
    flex:0 0 110px;
  }
  .knap-fortryd:hover { background:rgba(245,215,110,0.1); color:#f5d76e; }

  .besked {
    margin-top:16px;
    min-height:24px;
    font-size:0.95rem;
    color:#ff9999;
  }
  .besked.ok { color:#90ee90; }
  .gaest-link {
    margin-top:20px;
    font-size:0.85rem;
  }
  .gaest-link a {
    color:#c9b96e;
    text-decoration:underline;
    cursor:pointer;
  }
  .hjaelp {
    margin-top:24px;
    font-size:0.78rem;
    color:#8a7d4a;
    line-height:1.5;
  }
  .installer-knap {
    display:none;
    margin-top:20px;
    padding:10px 20px;
    background:transparent;
    color:#f5d76e;
    border:1px dashed #f5d76e;
    border-radius:4px;
    cursor:pointer;
    font-family:inherit;
    font-size:0.9rem;
  }
  .installer-knap:hover { background:rgba(245,215,110,0.1); }
  .husk-mig {
    margin:8px 0 14px;
    text-align:left;
    color:#c9b96e;
    font-size:0.85rem;
  }
  .husk-mig input { margin-right:8px; }
</style>
</head>
<body>

<div class="login-boks">
  <img src="icon-512.png" alt="OlsenKlanen logo" class="logo">
  <h1>OlsenKlanen</h1>
  <div class="undertekst">Familieside</div>

  <input type="text" id="nr" class="felt" inputmode="numeric" placeholder="Dit medlemsnummer" autofocus autocomplete="off">

  <div class="kode-wrapper">
    <input type="password" id="kode" class="felt" inputmode="numeric" placeholder="Din PIN-kode" autocomplete="off">
    <button type="button" class="vis-kode" id="visKodeKnap" onclick="visKode()" title="Vis koden">🔍</button>
  </div>

  <label class="husk-mig">
    <input type="checkbox" id="huskMig" checked>
    Husk mig på denne computer
  </label>

  <div class="knap-raekke">
    <button class="knap" id="logIndKnap" onclick="logInd()">Log ind</button>
    <button class="knap knap-fortryd" onclick="fortryd()">Fortryd</button>
  </div>

  <div id="besked" class="besked"></div>

  <button id="installerKnap" class="installer-knap" onclick="installerApp()">
    📲 Installer OlsenKlanen som app
  </button>

  <div class="hjaelp">
    Log ind med dit medlemsnummer og din PIN-kode.<br>
    Kender du ikke din kode? Spørg OlsenBanden.
  </div>
</div>

<script type="module">
  // ============================================================
  //  OlsenKlanen — SAMLET LOGIN  (medlemsnr. + PIN for ALLE)
  //  Version v20.1 — 10. juni 2026
  //  Erstatter det gamle email + fælleskode-system.
  // ============================================================

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDlydsBrJQswqtiqTLM4yXDQWHbAolMpZU",
    authDomain: "olsenklanen-familieside.firebaseapp.com",
    projectId: "olsenklanen-familieside",
    storageBucket: "olsenklanen-familieside.firebasestorage.app",
    messagingSenderId: "640843662410",
    appId: "1:640843662410:web:e749b77ec9271e75c4d2b3"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ---- Admin styres i KARTOTEKET (feltet 'rettighed' = "admin") ----
  // Ekstra sikkerheds-bagstopper: nr. 8 (Carsten) er ALTID admin,
  // saa administrator aldrig kan laase sig selv ude.
  const ALTID_ADMIN = ["8"];

  // ---- Gaestenumre (styres af OlsenBanden i gaeste-administrationen) ----
  const GAESTENUMRE = ["996", "997", "998", "999"];

  // ---- ALTID HOVEDDOEREN: ryd evt. gemt sidste-side ----
  try { sessionStorage.removeItem("ok_sidste_side"); } catch(e) {}

  // ---- HUSK MIG: udfyld medlemsnummer hvis vi har gemt foer ----
  try {
    const gemtNr = localStorage.getItem("ok_husk_nr");
    if (gemtNr) document.getElementById("nr").value = gemtNr;
  } catch(e) {}

  // Traek fornavnet ud af et fuldt navn ("Carsten Gram" -> "Carsten")
  function fornavnAf(fuldtNavn) {
    return (fuldtNavn || "").trim().split(/\s+/)[0] || "";
  }

  async function logInd() {
    const nr     = document.getElementById("nr").value.trim();
    const kode   = document.getElementById("kode").value.trim();
    const husk   = document.getElementById("huskMig").checked;
    const besked = document.getElementById("besked");
    const knap   = document.getElementById("logIndKnap");

    if (!nr || !kode) {
      besked.textContent = "Skriv både medlemsnummer og PIN-kode.";
      besked.className = "besked";
      return;
    }

    knap.disabled = true;
    besked.textContent = "Tjekker...";
    besked.className = "besked";

    try {
      const snap = await getDoc(doc(db, "membres", nr));

      if (!snap.exists()) {
        besked.textContent = "Medlemsnummer ikke fundet. Tjek nummeret.";
        besked.className = "besked";
        knap.disabled = false;
        return;
      }

      const d = snap.data();
      const rigtigKode = String(d.kode || "").trim();

      if (!rigtigKode) {
        besked.textContent = "Der er endnu ikke sat en PIN-kode på dette nummer. Spørg OlsenBanden.";
        besked.className = "besked";
        knap.disabled = false;
        return;
      }

      if (kode !== rigtigKode) {
        besked.textContent = "Forkert PIN-kode.";
        besked.className = "besked";
        knap.disabled = false;
        return;
      }

      // ---- GAESTE-TJEK (numrene 996-999) ----
      if (GAESTENUMRE.includes(nr)) {
        const g = d.gaest || null;

        if (!g || !g.aktiv) {
          besked.textContent = "Denne gæsteadgang er ikke aktiv. Kontakt OlsenBanden.";
          besked.className = "besked";
          knap.disabled = false;
          return;
        }

        const udloeber = Number(g.udloeber || 0);
        if (!udloeber || Date.now() > udloeber) {
          besked.textContent = "Gæsteadgangen er udløbet. Kontakt OlsenBanden for ny adgang.";
          besked.className = "besked";
          knap.disabled = false;
          return;
        }

        try { sessionStorage.setItem("ok_gaest_udloeber", String(udloeber)); } catch(e) {}
      }

      // ---- Login lykkedes ----
      // Gæster (996-999) og kort uden flere voksne logger direkte ind.
      // Kort med flere voksne: vis "Hvem er du?"-valg, så rettigheden følger PERSONEN.
      const voksne = (d.familiemedlemmer || []).filter(p => p.rolle !== "barn" && (p.fornavn || p.navn || "").trim());

      // Husk medlemsnummer (aldrig PIN-koden)
      try {
        if (husk) localStorage.setItem("ok_husk_nr", nr);
        else      localStorage.removeItem("ok_husk_nr");
      } catch(e) {}

      if (voksne.length >= 2 && !GAESTENUMRE.includes(nr)) {
        // Flere voksne -> lad personen vælge sig selv
        knap.disabled = false;
        visPersonValg(nr, d, voksne, husk);
        return;
      }

      // Kun én voksen (eller gæst): find navn + rettighed direkte
      let valgtPerson = voksne.length === 1 ? voksne[0] : null;
      fuldfoerLogin(nr, d, valgtPerson, husk);

    } catch(err) {
      console.log("Login-fejl:", err);
      besked.textContent = "Der opstod en fejl. Tjek din internetforbindelse og prøv igen.";
      besked.className = "besked";
      knap.disabled = false;
    }
  }

  // ---- HVEM ER DU? (kort med flere voksne) ----
  // Viser en knap pr. voksen. Den valgte persons rettighed foelger med.
  function personNavnAf(p) {
    const dele = [p.fornavn, p.efternavn].filter(Boolean);
    if (dele.length) return dele.join(" ");
    return (p.navn || "").trim();
  }

  function visPersonValg(nr, d, voksne, husk) {
    const besked = document.getElementById("besked");
    besked.textContent = "";
    besked.className = "besked";

    // Byg knapper under login-felterne
    let boks = document.getElementById("hvem-er-du");
    if (boks) boks.remove();
    boks = document.createElement("div");
    boks.id = "hvem-er-du";
    boks.style.marginTop = "18px";

    const titel = document.createElement("div");
    titel.textContent = "Hvem logger ind?";
    titel.style.cssText = "color:#f5d76e;font-size:1rem;margin-bottom:10px;letter-spacing:1px";
    boks.appendChild(titel);

    voksne.forEach(p => {
      const navn = personNavnAf(p);
      const b = document.createElement("button");
      b.className = "knap";
      b.style.cssText = "width:100%;margin-bottom:8px";
      b.textContent = navn;
      b.onclick = function() {
        fuldfoerLogin(nr, d, p, husk);
      };
      boks.appendChild(b);
    });

    document.querySelector(".login-boks").appendChild(boks);
  }

  function fuldfoerLogin(nr, d, valgtPerson, husk) {
    const besked = document.getElementById("besked");

    // Navn: fra valgt person, ellers kortets 'navne'
    let navn = valgtPerson ? personNavnAf(valgtPerson) : (d.navne || "").trim();
    if (!navn) navn = "Medlem " + nr;
    const fornavn = fornavnAf(navn);

    // RETTIGHED: foerst personens egen, ellers kortets, ellers 'medlem'.
    // Nr. 8 er altid admin (bagstopper).
    let rettighed = "medlem";
    if (valgtPerson && valgtPerson.rettighed) rettighed = String(valgtPerson.rettighed);
    else if (d.rettighed) rettighed = String(d.rettighed);
    rettighed = rettighed.trim().toLowerCase();
    if (ALTID_ADMIN.includes(nr)) rettighed = "admin";

    try {
      if (husk) localStorage.setItem("ok_husk_nr", nr);
      else      localStorage.removeItem("ok_husk_nr");
    } catch(e) {}

    // ---- HAANDTRYK: "Velkommen medlem 8 Carsten" ----
    besked.textContent = fornavn
      ? ("Velkommen medlem " + nr + " " + fornavn)
      : ("Velkommen medlem " + nr);
    besked.className = "besked ok";

    const boks = document.getElementById("hvem-er-du");
    if (boks) boks.remove();

    gemAdgang(rettighed, navn, nr);
    videreTil("forside.html");
  }

  function fortryd() {
    document.getElementById("nr").value = "";
    document.getElementById("kode").value = "";
    document.getElementById("kode").type = "password";
    document.getElementById("visKodeKnap").textContent = "🔍";
    document.getElementById("besked").textContent = "Login afbrudt.";
    document.getElementById("besked").className = "besked";
    const boks = document.getElementById("hvem-er-du");
    if (boks) boks.remove();
    document.getElementById("nr").focus();
  }

  // ---- VIS KODE: forstoerrelsesglas-knap ----
  function visKode() {
    const kodeFelt = document.getElementById("kode");
    const knap = document.getElementById("visKodeKnap");
    if (kodeFelt.type === "password") {
      kodeFelt.type = "text";
      knap.textContent = "🙈";
      knap.title = "Skjul koden";
    } else {
      kodeFelt.type = "password";
      knap.textContent = "🔍";
      knap.title = "Vis koden";
    }
  }

  // ---- Gem hvem der er logget ind (nr + navn + rettighed) ----
  function gemAdgang(niveau, navn, nr) {
    try {
      sessionStorage.setItem("ok_niveau", niveau);
      sessionStorage.setItem("ok_navn", navn);
      sessionStorage.setItem("ok_nr", nr);
      localStorage.setItem("ok_niveau", niveau);
      localStorage.setItem("ok_navn", navn);
      localStorage.setItem("ok_nr", nr);
    } catch(e) {}
  }

  function videreTil(side) {
    // Vent 2,5 sek. saa haandtryk-beskeden kan naa at blive laest
    setTimeout(function() { window.location.href = side; }, 2500);
  }

  // ---- Enter-tast ----
  document.getElementById("kode").addEventListener("keydown", function(e) {
    if (e.key === "Enter") logInd();
  });
  document.getElementById("nr").addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("kode").focus();
  });

  // ---- Goer funktioner tilgaengelige for knapperne i HTML ----
  window.logInd = logInd;
  window.fortryd = fortryd;
  window.visKode = visKode;

  // ---- PWA: Service Worker ----
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker.register("sw.js").catch(function(err) {
        console.log("SW registrering fejlede:", err);
      });
    });
  }

  // ---- PWA: Installer-knap ----
  let installPrompt = null;
  window.addEventListener("beforeinstallprompt", function(e) {
    e.preventDefault();
    installPrompt = e;
    document.getElementById("installerKnap").style.display = "inline-block";
  });

  window.installerApp = function() {
    if (!installPrompt) {
      alert("Installation er ikke tilgængelig i denne browser. Prøv Chrome eller Edge på computer, eller 'Føj til hjemmeskærm' i Safari på iPhone.");
      return;
    }
    installPrompt.prompt();
    installPrompt.userChoice.then(function() {
      installPrompt = null;
      document.getElementById("installerKnap").style.display = "none";
    });
  };
</script>

</body>
</html>
