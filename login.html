<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OlsenKlanen — Log ind</title>
 
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1B4332">
<link rel="apple-touch-icon" href="icon-192.png">
 
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    font-family: Georgia, serif;
    background:#1B4332;
    color:#f5d76e;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
  }
  .login-boks {
    text-align:center;
    padding:40px;
    max-width:420px;
    width:90%;
  }
  .logo {
    width:160px;
    height:160px;
    margin:0 auto 20px;
    display:block;
    border-radius:12px;
  }
  h1 {
    color:#f5d76e;
    font-size:2rem;
    margin-bottom:8px;
    letter-spacing:2px;
  }
  .undertekst {
    color:#c9b96e;
    font-style:italic;
    margin-bottom:30px;
    font-size:0.95rem;
  }
  .felt {
    width:100%;
    padding:14px 16px;
    font-size:1.1rem;
    font-family:inherit;
    border:1px solid #f5d76e;
    background:rgba(255,255,255,0.05);
    color:#fff;
    border-radius:4px;
    margin-bottom:14px;
    text-align:center;
    letter-spacing:1px;
  }
  .felt:focus { outline:none; border-color:#fff; background:rgba(255,255,255,0.1); }
  .felt::placeholder { color:#a89860; }
 
  /* Kode-feltet med forstørrelsesglas */
  .kode-wrapper {
    position:relative;
    margin-bottom:14px;
  }
  .kode-wrapper .felt {
    margin-bottom:0;
    padding-right:48px;
  }
  .vis-kode {
    position:absolute;
    right:8px;
    top:50%;
    transform:translateY(-50%);
    background:transparent;
    border:none;
    color:#f5d76e;
    cursor:pointer;
    font-size:1.3rem;
    padding:8px;
    border-radius:4px;
  }
  .vis-kode:hover { background:rgba(245,215,110,0.1); }
 
  /* Knap-række (Log ind + Fortryd) */
  .knap-raekke {
    display:flex;
    gap:10px;
    margin-top:6px;
  }
  .knap {
    flex:1;
    padding:14px;
    font-size:1.1rem;
    font-family:inherit;
    background:#f5d76e;
    color:#1B4332;
    border:none;
    border-radius:4px;
    cursor:pointer;
    font-weight:bold;
    letter-spacing:1px;
  }
  .knap:hover { background:#fff; }
  .knap-fortryd {
    background:transparent;
    color:#f5d76e;
    border:1px solid #f5d76e;
    flex:0 0 110px;
  }
  .knap-fortryd:hover { background:rgba(245,215,110,0.1); color:#f5d76e; }
 
  .besked {
    margin-top:16px;
    min-height:24px;
    font-size:0.95rem;
    color:#ff9999;
  }
  .besked.ok { color:#90ee90; }
  .gaest-link {
    margin-top:20px;
    font-size:0.85rem;
  }
  .gaest-link a {
    color:#c9b96e;
    text-decoration:underline;
    cursor:pointer;
  }
  .hjaelp {
    margin-top:24px;
    font-size:0.78rem;
    color:#8a7d4a;
    line-height:1.5;
  }
  .installer-knap {
    display:none;
    margin-top:20px;
    padding:10px 20px;
    background:transparent;
    color:#f5d76e;
    border:1px dashed #f5d76e;
    border-radius:4px;
    cursor:pointer;
    font-family:inherit;
    font-size:0.9rem;
  }
  .installer-knap:hover { background:rgba(245,215,110,0.1); }
  .husk-mig {
    margin:8px 0 14px;
    text-align:left;
    color:#c9b96e;
    font-size:0.85rem;
  }
  .husk-mig input { margin-right:8px; }
</style>
</head>
<body>
 
<div class="login-boks">
  <img src="icon-512.png" alt="OlsenKlanen logo" class="logo">
  <h1>OlsenKlanen</h1>
  <div class="undertekst">Familieside</div>
 
  <input type="email" id="email" class="felt" placeholder="Din email" autofocus autocomplete="email">
 
  <div class="kode-wrapper">
    <input type="password" id="kode" class="felt" placeholder="Din kode" autocomplete="current-password">
    <button type="button" class="vis-kode" id="visKodeKnap" onclick="visKode()" title="Vis koden">🔍</button>
  </div>
 
  <label class="husk-mig">
    <input type="checkbox" id="huskMig" checked>
    Husk mig på denne computer
  </label>
 
  <div class="knap-raekke">
    <button class="knap" onclick="logInd()">Log ind</button>
    <button class="knap knap-fortryd" onclick="fortryd()">Fortryd</button>
  </div>
 
  <div id="besked" class="besked"></div>
 
  <div class="gaest-link">
    <a onclick="logIndSomGaest()">Log ind som gæst</a>
  </div>
 
  <button id="installerKnap" class="installer-knap" onclick="installerApp()">
    📲 Installer OlsenKlanen som app
  </button>
 
  <div class="hjaelp">
    OlsenBanden bruger fælleskoden indtil videre.<br>
    Egen kode kan vælges senere.
  </div>
</div>
 
<script>
  // Login-system — version v19.8 — 18. maj 2026
  // Med PWA + Husk mig + Forstørrelsesglas + Fortryd-knap
 
  // ---- ALTID HOVEDDØREN: Ryd evt. gemt sidste-side ----
  try {
    sessionStorage.removeItem("ok_sidste_side");
  } catch(e) {}
 
  // ---- OLSENBANDEN ----
  const OLSENBANDEN = [
    { email: "cg@gallerieg.dk",     navn: "Carsten Gram",          rettighed: "admin" },
    { email: "tvo@ishoejby.dk",     navn: "Tommy Vormslev Olsen",  rettighed: "olsenbanden" },
    { email: "kurt@vormslev.dk",    navn: "Kurt Olsen",            rettighed: "olsenbanden" },
    { email: "safi@dr.dk",          navn: "Sanne Gram Fadel",      rettighed: "olsenbanden" },
    { email: "kld@inmobia.com",     navn: "Karin Lund",            rettighed: "olsenbanden" }
  ];
  const FAELLESKODE = "Olsen26";
 
  // ---- HUSK MIG: udfyld felter hvis vi har gemt før ----
  try {
    const gemtEmail = localStorage.getItem("ok_husk_email");
    const gemtKode  = localStorage.getItem("ok_husk_kode");
    if (gemtEmail) document.getElementById("email").value = gemtEmail;
    if (gemtKode)  document.getElementById("kode").value  = gemtKode;
  } catch(e) {}
 
  function logInd() {
    const email   = document.getElementById("email").value.trim().toLowerCase();
    const kode    = document.getElementById("kode").value.trim();
    const husk    = document.getElementById("huskMig").checked;
    const besked  = document.getElementById("besked");
 
    if (!email || !kode) {
      besked.textContent = "Skriv både email og kode.";
      besked.className = "besked";
      return;
    }
 
    const person = OLSENBANDEN.find(p => p.email.toLowerCase() === email);
    if (!person) {
      besked.textContent = "Email ikke fundet. Tjek stavning.";
      besked.className = "besked";
      return;
    }
 
    if (kode !== FAELLESKODE) {
      besked.textContent = "Forkert kode.";
      besked.className = "besked";
      return;
    }
 
    // Gem "husk mig"
    try {
      if (husk) {
        localStorage.setItem("ok_husk_email", email);
        localStorage.setItem("ok_husk_kode", kode);
      } else {
        localStorage.removeItem("ok_husk_email");
        localStorage.removeItem("ok_husk_kode");
      }
    } catch(e) {}
 
    besked.textContent = "Velkommen, " + person.navn + "!";
    besked.className = "besked ok";
    gemAdgang(person.rettighed, person.navn, person.email);
    videreTil("forside.html");
  }
 
  function logIndSomGaest() {
    const besked = document.getElementById("besked");
    besked.textContent = "Velkommen — du er logget ind som gæst.";
    besked.className = "besked ok";
    gemAdgang("gaest", "Gæst", "");
    videreTil("forside.html");
  }
 
  // ---- FORTRYD: ryd felterne og skjul koden igen ----
  function fortryd() {
    document.getElementById("email").value = "";
    document.getElementById("kode").value = "";
    document.getElementById("kode").type = "password";
    document.getElementById("visKodeKnap").textContent = "🔍";
    document.getElementById("besked").textContent = "Login afbrudt.";
    document.getElementById("besked").className = "besked";
    document.getElementById("email").focus();
  }
 
  // ---- VIS KODE: forstørrelsesglas-knap ----
  function visKode() {
    const kodeFelt = document.getElementById("kode");
    const knap = document.getElementById("visKodeKnap");
    if (kodeFelt.type === "password") {
      kodeFelt.type = "text";
      knap.textContent = "🙈";
      knap.title = "Skjul koden";
    } else {
      kodeFelt.type = "password";
      knap.textContent = "🔍";
      knap.title = "Vis koden";
    }
  }
 
  function gemAdgang(niveau, navn, email) {
    try {
      sessionStorage.setItem("ok_niveau", niveau);
      sessionStorage.setItem("ok_navn", navn);
      sessionStorage.setItem("ok_email", email);
      localStorage.setItem("ok_niveau", niveau);
      localStorage.setItem("ok_navn", navn);
      localStorage.setItem("ok_email", email);
    } catch(e) {}
  }
 
  function videreTil(side) {
    setTimeout(function() { window.location.href = side; }, 800);
  }
 
  // Enter-tast
  document.getElementById("kode").addEventListener("keydown", function(e) {
    if (e.key === "Enter") logInd();
  });
  document.getElementById("email").addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("kode").focus();
  });
 
  // ---- PWA: Service Worker registrering ----
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function() {
      navigator.serviceWorker.register("sw.js").catch(function(err) {
        console.log("SW registrering fejlede:", err);
      });
    });
  }
 
  // ---- PWA: Installer-knap ----
  let installPrompt = null;
  window.addEventListener("beforeinstallprompt", function(e) {
    e.preventDefault();
    installPrompt = e;
    document.getElementById("installerKnap").style.display = "inline-block";
  });
 
  function installerApp() {
    if (!installPrompt) {
      alert("Installation er ikke tilgængelig i denne browser. Prøv Chrome eller Edge på computer, eller 'Føj til hjemmeskærm' i Safari på iPhone.");
      return;
    }
    installPrompt.prompt();
    installPrompt.userChoice.then(function() {
      installPrompt = null;
      document.getElementById("installerKnap").style.display = "none";
    });
  }
</script>
 
</body>
</html>
