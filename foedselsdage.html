<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --gron:#2d5016;--gron-lys:#4a7c2a;--gron-pale:#e8f0dc;
  --guld:#c8952a;--guld-lys:#f5e6c8;--guld-pale:#fdf8ee;
  --sølv:#8a8a8a;--sølv-lys:#f0f0f0;--sølv-pale:#e8e8e8;
  --lilla:#6b3580;--lilla-lys:#e8d5f5;--lilla-pale:#f5eeff;
  --rund-bg:#dff2d8;--rund-kant:#2d7a1f;--rund-tekst:#1a4d10;
  --hvid:#fefcf8;--tekst:#1a1a0e;--tekst-lys:#5a5a40;--border:#d4c9a0;
  --baggrund:#fffde0;
}

body{
  font-family:'Source Sans 3',sans-serif;
  background:var(--baggrund);
  color:var(--tekst);
  min-height:100vh;
}

/* ─── TOPBAR ─── */
.topbar{
  background:var(--gron);
  border-bottom:3px solid var(--guld);
  padding:0 1.5rem; height:52px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:100;
}
.topbar-logo{
  font-family:'Playfair Display',serif;
  font-size:20px; font-weight:500;
  color:var(--hvid); text-decoration:none; letter-spacing:-0.3px;
}
.topbar-links{display:flex; gap:1.25rem;}
.topbar-links a{
  font-size:12px; color:rgba(255,255,255,0.65);
  text-decoration:none; letter-spacing:0.3px;
}
.topbar-links a:hover{color:var(--guld-lys);}
.topbar-links a.aktiv{color:var(--guld-lys);}

/* ─── SIDE-HEADER ─── */
.side-header{
  background:var(--gron);
  padding:2rem 2rem 1.5rem;
  border-bottom:1px solid rgba(200,149,42,0.3);
  text-align:center;
}
.side-header h1{
  font-family:'Playfair Display',serif;
  font-size:36px; font-weight:400; color:var(--hvid);
  margin-bottom:0.3rem;
}
.side-header p{font-size:13px; color:rgba(255,255,255,0.55); letter-spacing:1px;}
.guld-streg{width:40px;height:2px;background:var(--guld);margin:1rem auto 0;border-radius:2px;}

/* ─── WRAPPER ─── */
.wrapper{max-width:900px; margin:0 auto; padding:1.75rem 1rem 3rem;}

/* ─── NÆSTE MÆRKEDAGE ─── */
.naeste-boks{
  background:var(--hvid);
  border:1px solid var(--border);
  border-top:4px solid var(--gron);
  border-radius:6px;
  margin-bottom:2rem;
  box-shadow:0 2px 12px rgba(0,0,0,0.07);
}
.naeste-boks-header{
  padding:0.75rem 1.25rem;
  background:var(--guld-pale);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:0.5rem;
  font-family:'Playfair Display',serif;
  font-size:17px; font-weight:500; color:var(--tekst);
}
.naeste-tom{
  padding:1rem 1.25rem;
  font-size:13px; color:var(--tekst-lys); font-style:italic;
}
.naeste-tabel{width:100%; border-collapse:collapse;}
.naeste-tabel td{
  padding:0.55rem 1rem;
  font-size:13px;
  border-bottom:1px solid rgba(212,201,160,0.4);
  vertical-align:middle;
}
.naeste-tabel tr:last-child td{border-bottom:none;}
.naeste-tabel .td-dato{
  width:90px; font-weight:500; color:var(--gron);
  white-space:nowrap;
}
.naeste-tabel .td-dage{
  width:80px; font-size:11px; color:var(--tekst-lys);
  text-align:right; white-space:nowrap;
}
.naeste-tabel tr.idag-row .td-dato{color:var(--guld);}

/* ─── LEGENDE ─── */
.legende{
  display:flex; flex-wrap:wrap; gap:0.75rem 1.5rem;
  padding:0.75rem 1.25rem;
  background:var(--hvid);
  border:1px solid var(--border);
  border-radius:6px;
  margin-bottom:2rem;
  font-size:12px;
}
.legende-item{display:flex; align-items:center; gap:0.4rem; color:var(--tekst-lys);}
.farve-plet{
  display:inline-block; width:14px; height:14px;
  border-radius:3px; border:1px solid rgba(0,0,0,0.15);
  flex-shrink:0;
}

/* ─── MÅNEDS-BLOK ─── */
.maaned-blok{margin-bottom:2.25rem;}
.maaned-header{
  font-family:'Playfair Display',serif;
  font-size:22px; font-weight:500;
  color:var(--hvid);
  background:var(--gron);
  padding:0.5rem 1rem;
  border-radius:5px 5px 0 0;
  display:flex; align-items:baseline; justify-content:space-between;
}
.maaned-antal{font-size:12px; font-weight:300; color:rgba(255,255,255,0.6); font-family:'Source Sans 3',sans-serif;}

/* ─── TABEL ─── */
.tabel{
  width:100%; border-collapse:collapse;
  border:1px solid var(--border);
  border-top:none;
  background:var(--hvid);
  border-radius:0 0 5px 5px;
  overflow:hidden;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}
.tabel thead tr{background:rgba(45,80,22,0.08);}
.tabel th{
  padding:0.5rem 0.85rem;
  font-size:11px; font-weight:600;
  color:var(--tekst-lys); text-transform:uppercase; letter-spacing:0.5px;
  text-align:left; border-bottom:2px solid var(--border);
}
.tabel th.td-alder,.tabel th.td-maerke{text-align:center;}
.tabel td{
  padding:0.52rem 0.85rem;
  font-size:13.5px;
  border-bottom:1px solid rgba(212,201,160,0.35);
  vertical-align:middle;
}
.tabel tr:last-child td{border-bottom:none;}
.tabel tbody tr:hover{background:rgba(0,0,0,0.025);}

.td-dato{width:70px; font-weight:500; color:var(--gron); white-space:nowrap;}
.td-navn{min-width:200px;}
.td-alder{width:70px; text-align:center; color:var(--tekst-lys); font-size:13px;}
.td-maerke{width:160px; text-align:center;}

/* ─── RÆKKEFREMHÆVNING ─── */
tr.rund{background:var(--rund-bg);}
tr.rund:hover{background:#d0edc5;}
tr.rund .td-dato{color:var(--rund-kant);}
tr.rund .td-alder{color:var(--rund-tekst); font-weight:600;}

tr.konf{background:var(--lilla-pale);}
tr.konf:hover{background:var(--lilla-lys);}
tr.konf .td-dato{color:var(--lilla);}

tr.sølv{background:var(--sølv-lys);}
tr.sølv:hover{background:var(--sølv-pale);}
tr.sølv .td-dato{color:var(--sølv);}

tr.guld-bryl{background:var(--guld-lys);}
tr.guld-bryl:hover{background:#eedca8;}
tr.guld-bryl .td-dato{color:#8a6010;}

tr.idag-foeds{background:#fff8cc;}
tr.idag-foeds:hover{background:#fff1a0;}
tr.idag-foeds .td-dato{color:#b8790a; font-weight:700;}

/* ─── BADGES ─── */
.badge{
  display:inline-flex; align-items:center; gap:3px;
  font-size:11px; font-weight:600;
  padding:2px 8px; border-radius:20px;
  white-space:nowrap;
}
.badge-rund{background:var(--rund-kant); color:white;}
.badge-konf{background:var(--lilla); color:white;}
.badge-sølv{background:#777; color:white;}
.badge-guld{background:var(--guld); color:white;}
.badge-idag{background:#c8790a; color:white;}

/* ─── FOOTER ─── */
footer{
  background:var(--gron); border-top:2px solid var(--guld);
  text-align:center; padding:1.25rem;
  color:rgba(255,255,255,0.4); font-size:12px;
}

/* ─── MOBIL ─── */
@media(max-width:600px){
  .topbar-links{display:none;}
  .side-header h1{font-size:26px;}
  .tabel th.td-dato,.tabel td.td-dato{display:none;}
  .td-maerke{width:auto;}
  .maaned-header{font-size:18px;}
}

const idagAar = idag.getFullYear();

function dageHenTil(dag, mdr) {
  let d = new Date(idagAar, mdr-1, dag); d.setHours(0,0,0,0);
  if (d < idag) d.setFullYear(idagAar + 1);
  return Math.round((d - idag) / 86400000);
}

function alderPrIdag(dag, mdr, fodselsaar) {
  let a = idagAar - fodselsaar;
  if ((idag.getMonth()+1) < mdr || ((idag.getMonth()+1) === mdr && idag.getDate() < dag)) a--;
  return a;
}

function alderIDenneKalenderaar(fodselsaar) {
  return idagAar - fodselsaar;
}

function erIdag(dag, mdr) {
  return idag.getDate() === dag && (idag.getMonth()+1) === mdr;
}

function typeInfo(p) {
  // Returnerer {klasse, badge} eller null
  const alder = alderPrIdag(p.dag, p.mdr, p.aar);
  const alderKal = alderIDenneKalenderaar(p.aar);
  if (erIdag(p.dag, p.mdr)) {
    if (RUNDE_ALDRE.includes(alderKal))
      return {klasse:'rund idag-foeds', badge:`<span class="badge badge-rund">🎂 ${alderKal} år</span><span class="badge badge-idag">I dag!</span>`};
    if (KONF_ALDRE.includes(alderKal))
      return {klasse:'konf idag-foeds', badge:`<span class="badge badge-konf">✝️ Konfirmationsalder</span><span class="badge badge-idag">I dag!</span>`};
    return {klasse:'idag-foeds', badge:`<span class="badge badge-idag">🎂 I dag!</span>`};
  }
  if (RUNDE_ALDRE.includes(alderKal))
    return {klasse:'rund', badge:`<span class="badge badge-rund">🎂 ${alderKal} år</span>`};
  if (KONF_ALDRE.includes(alderKal))
    return {klasse:'konf', badge:`<span class="badge badge-konf">✝️ Konf.alder</span>`};
  return {klasse:'', badge:''};
}

function bryllupsType(aar) {
  const gifteAar = idagAar - aar;
  if (gifteAar === 50) return {klasse:'guld-bryl', badge:`<span class="badge badge-guld">💍 Guldbryllup</span>`};
  if (gifteAar === 25) return {klasse:'sølv', badge:`<span class="badge badge-sølv">💍 Sølvbryllup</span>`};
  return null;
}

// ─── HEADER / FOOTER ─────────────────────────────────────────────────────────
document.getElementById('header-sub').textContent =
  `${FOEDSLER.length} familiemedlemmer · Alder beregnet løbende`;
document.getElementById('footer-tekst').textContent =
  `OlsenKlanen · Fødselsdage & Mærkedage · Opdateret pr. ${idag.toLocaleDateString('da-DK',{day:'numeric',month:'long',year:'numeric'})}`;

// ─── NÆSTE 30 DAGE ───────────────────────────────────────────────────────────
(function() {
  const kommende = [];

  FOEDSLER.forEach(p => {
    const d = dageHenTil(p.dag, p.mdr);
    if (d > 30) return;
    const alderKal = alderIDenneKalenderaar(p.aar);
    const alder    = alderPrIdag(p.dag, p.mdr, p.aar) + (d > 0 ? 1 : 0);
    let badge = '';
    if (d === 0) badge = '<span class="badge badge-idag">I dag!</span>';
    if (RUNDE_ALDRE.includes(alderKal)) badge += `<span class="badge badge-rund">🎂 ${alderKal} år</span>`;
    else if (KONF_ALDRE.includes(alderKal)) badge += `<span class="badge badge-konf">✝️ Konfirmationsalder</span>`;
    kommende.push({dato:`${p.dag}. ${MAANEDER_KORT[p.mdr-1]}`, navn:p.navn, note:`fylder ${alder} år`, badge, dage:d, erIdag:d===0});
  });

  BRYLLUPPER.forEach(b => {
    const d = dageHenTil(b.dag, b.mdr);
    if (d > 30) return;
    const bt = bryllupsType(b.aar);
    if (!bt) return;
    kommende.push({dato:`${b.dag}. ${MAANEDER_KORT[b.mdr-1]}`, navn:b.navne, note:'bryllupsdag', badge:bt.badge, dage:d, erIdag:d===0});
  });

  kommende.sort((a,b) => a.dage - b.dage);

  const el = document.getElementById('naeste-indhold');
  if (kommende.length === 0) {
    el.innerHTML = '<div class="naeste-tom">Ingen mærkedage de næste 30 dage.</div>';
    return;
  }
  let html = '<table class="naeste-tabel"><tbody>';
  kommende.forEach(k => {
    const dagTekst = k.erIdag ? '<strong>I dag</strong>' : (k.dage === 1 ? 'I morgen' : `Om ${k.dage} dage`);
    html += `<tr class="${k.erIdag ? 'idag-row' : ''}">
      <td class="td-dato">${k.dato}</td>
      <td>${k.navn} <span style="color:var(--tekst-lys);font-size:12px">${k.note}</span> ${k.badge}</td>
      <td class="td-dage">${dagTekst}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  el.innerHTML = html;
})();

// ─── KALENDER MÅNEDER ────────────────────────────────────────────────────────
const kalender = document.getElementById('kalender');

for (let m = 1; m <= 12; m++) {
  const folk = FOEDSLER.filter(p => p.mdr === m).sort((a,b) => a.dag - b.dag);
  const bryl = BRYLLUPPER.filter(b => b.mdr === m).sort((a,b) => a.dag - b.dag);
  if (folk.length === 0 && bryl.length === 0) continue;

  // Saml alle rækker i sorteret rækkefølge
  const raekker = [];
  folk.forEach(p => {
    const ti = typeInfo(p);
    const alder = alderPrIdag(p.dag, p.mdr, p.aar);
    const alderKal = alderIDenneKalenderaar(p.aar);
    const visAlder = alder >= 0 ? (erIdag(p.dag,p.mdr) ? alderKal : alder) : '—';
    raekker.push({dag:p.dag, klasse:ti.klasse, datoTekst:`${p.dag}. ${MAANEDER_KORT[m-1]}`, navn:p.navn, alder:visAlder, badge:ti.badge});
  });
  bryl.forEach(b => {
    const bt = bryllupsType(b.aar);
    if (!bt) return;
    const aar = idagAar - b.aar;
    raekker.push({dag:b.dag, klasse:bt.klasse, datoTekst:`${b.dag}. ${MAANEDER_KORT[m-1]}`, navn:b.navne, alder:`${aar} år`, badge:bt.badge});
  });
  raekker.sort((a,b) => a.dag - b.dag);

  let html = `
    <div class="maaned-blok">
      <div class="maaned-header">
        ${MAANEDER[m-1]}
        <span class="maaned-antal">${folk.length} person${folk.length===1?'':'er'}</span>
      </div>
      <table class="tabel">
        <thead><tr>
          <th class="td-dato">Dato</th>
          <th>Navn</th>
          <th class="td-alder">Alder</th>
          <th class="td-maerke">Mærkedag</th>
        </tr></thead>
        <tbody>`;

  raekker.forEach(r => {
    html += `<tr class="${r.klasse}">
      <td class="td-dato">${r.datoTekst}</td>
      <td class="td-navn">${r.navn}</td>
      <td class="td-alder">${r.alder}</td>
      <td class="td-maerke">${r.badge}</td>
    </tr>`;
  });

  html += '</tbody></table></div>';
  kalender.innerHTML += html;
}
</script>
</body>
</html>
