<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OlsenKlanen — Familieside</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Georgia, serif; background:#f5f1e8; color:#2a2a2a; }

  .topbar { background:#2d4a1f; color:#f5d76e; padding:14px 24px; display:flex; justify-content:space-between; align-items:center; }
  .topbar h1 { font-size:1.4rem; }
  .topbar h1 span { color:#f5d76e; }
  .topbar-hoejre { display:flex; align-items:center; gap:14px; }
  .bruger-info { color:#f5d76e; font-size:0.9rem; font-style:italic; }
  .btn-login { background:transparent; color:#f5d76e; border:1px solid #f5d76e; padding:6px 16px; border-radius:4px; cursor:pointer; font-family:inherit; }
  .btn-login:hover { background:#f5d76e; color:#2d4a1f; }

  .layout { display:grid; grid-template-columns:240px 1fr 260px; gap:16px; padding:16px; }

  .opslag h3 { font-size:0.75rem; letter-spacing:2px; color:#666; margin-bottom:12px; }
  .opslag-item { background:#fff; padding:12px; margin-bottom:10px; border-left:3px solid #2d4a1f; border-radius:2px; }
  .opslag-item .ikon { font-size:1.3rem; }
  .opslag-item .titel { font-weight:bold; margin-top:4px; }
  .opslag-item .meta { font-size:0.8rem; color:#666; margin-top:2px; }

  .midten { display:flex; flex-direction:column; gap:12px; }

  .billede-felt {
    position:relative;
    width:100%;
    border-radius:4px;
    overflow:hidden;
    background:#2d4a1f;
  }
  .billede-felt img {
    display:block;
    width:100%;
    height:auto;
  }
  .billede-tekst { position:absolute; bottom:12px; left:16px; color:#fff; font-style:italic; text-shadow:0 1px 3px rgba(0,0,0,0.8); }
  .billede-dato { position:absolute; bottom:12px; right:16px; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.8); }

  .fremhaev { background:#fff; border-radius:4px; overflow:hidden; }
  .fremhaev-titel { background:#2d4a1f; color:#f5d76e; padding:6px 16px; font-weight:bold; letter-spacing:1px; font-size:0.9rem; }
  .fremhaev-row { display:flex; align-items:center; padding:5px 16px; border-bottom:1px solid #eee; font-size:0.9rem; }
  .fremhaev-row:last-child { border-bottom:none; }
  .fremhaev-dato { font-style:italic; color:#666; width:80px; }
  .fremhaev-tekst { flex:1; }
  .tag { padding:2px 10px; border-radius:12px; font-size:0.72rem; }
  .tag-maerkedag { background:#fff3cd; color:#856404; border:1px solid #ffe69c; }
  .tag-arrangement { background:#d4edda; color:#155724; border:1px solid #b8dac0; }
  .tag-jubilaeum { background:#fff3cd; color:#856404; border:1px solid #ffe69c; }

  .kalender { background:#fff; border-radius:4px; padding:10px 16px; }
  .kalender h3 { margin-bottom:6px; font-size:1rem; }
  .kalender-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; text-align:center; }
  .kalender-grid .dag-label { font-size:0.7rem; color:#999; padding:2px; }
  .kalender-grid .dag { padding:4px; font-size:0.85rem; }
  .dag.skovtur { background:#d4edda; border-radius:50%; font-weight:bold; }
  .dag.maerkedag { background:#fff3cd; border-radius:50%; font-weight:bold; }
  .dag.idag { background:#2d4a1f; color:#fff; border-radius:50%; font-weight:bold; }

  .nav h3 { font-size:0.75rem; letter-spacing:2px; color:#666; margin-bottom:12px; }
  .nav-item { background:#fff; padding:10px 14px; margin-bottom:6px; border-radius:3px; display:flex; align-items:center; gap:10px; cursor:pointer; }
  .nav-item:hover { background:#f0ead8; }
