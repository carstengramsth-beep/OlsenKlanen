<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gron:#2d5016;--gron-lys:#4a7c2a;--gron-pale:#c8e6b0;
  --guld:#c8952a;--guld-lys:#f5e6c8;--guld-pale:#fdf8ee;
  --hvid:#fefcf8;--tekst:#1a1a0e;--tekst-lys:#5a5a40;--border:#d4c9a0;
  --baggrund:#fffde0;
  --fare:#c0392b;--ok:#2d6e2d;--ok-lys:#e8f5e9;
}
body{font-family:'Source Sans 3',sans-serif;background:var(--baggrund);color:var(--tekst);min-height:100vh}

/* ── FLAG-BANNER ── */
.flag-banner{background:var(--gron);text-align:center;padding:.55rem 0;font-size:26px;letter-spacing:6px;border-bottom:3px solid var(--guld)}

/* ── TOPBAR ── */
.topbar{background:var(--gron);padding:0 1.5rem;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-logo{font-family:'Playfair Display',serif;font-size:19px;font-weight:500;color:var(--hvid);text-decoration:none}
.topbar-hojre{display:flex;align-items:center;gap:1.5rem}
.topbar-links{display:flex;gap:1.25rem}
.topbar-links a{font-size:12px;color:rgba(255,255,255,.6);text-decoration:none}
.topbar-links a:hover,.topbar-links a.aktiv{color:var(--guld-lys)}
#login-knap{background:none;border:1px solid rgba(255,255,255,.35);color:rgba(255,255,255,.75);font-size:11px;letter-spacing:1px;padding:5px 13px;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all .2s;border-radius:2px}
#login-knap:hover{border-color:var(--guld-lys);color:var(--guld-lys)}
#admin-badge{display:none;align-items:center;gap:.75rem}
#admin-email{font-size:11px;color:var(--guld-lys)}
#log-ud-knap{background:none;border:none;color:rgba(255,255,255,.45);font-size:11px;cursor:pointer;padding:0;font-family:'Source Sans 3',sans-serif;transition:color .2s}
#log-ud-knap:hover{color:var(--fare)}

/* ── SIDE-HEADER ── */
.side-header{background:var(--gron);padding:1.75rem 1rem 1.5rem;text-align:center;border-bottom:1px solid rgba(200,149,42,.35)}
.side-header h1{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,36px);font-weight:400;color:var(--hvid);margin-bottom:.3rem}
.side-header p{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1px}
.guld-streg{width:40px;height:2px;background:var(--guld);margin:.9rem auto 0;border-radius:2px}

/* ── WRAPPER ── */
.wrapper{max-width:1120px;margin:0 auto;padding:1.5rem 1rem 3rem}

/* ── SØGEBAR ── */
.soegebar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
.soege-input{flex:1;min-width:220px;border:1px solid var(--border);background:var(--hvid);padding:.6rem 1rem;font-size:14px;font-family:'Source Sans 3',sans-serif;color:var(--tekst);outline:none;border-radius:4px;transition:border-color .2s}
.soege-input:focus{border-color:var(--gron)}
.antal-linje{font-size:12px;color:var(--tekst-lys);white-space:nowrap}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem}
.ingen-resultater{grid-column:1/-1;text-align:center;padding:3rem 1rem;color:var(--tekst-lys);font-style:italic}

/* ── KORT ── */
.kort{background:var(--hvid);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;flex-direction:column;transition:box-shadow .2s}
.kort:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}

.kort-hoved{background:var(--gron);padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem}
.nr-badge{background:var(--guld);color:var(--tekst);font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0;letter-spacing:.5px}
.kort-navn{font-family:'Playfair Display',serif;font-size:15px;font-weight:400;color:var(--hvid);line-height:1.3}

.kort-krop{padding:1rem;flex:1}
.info-linje{display:flex;gap:.65rem;align-items:flex-start;margin-bottom:.65rem;font-size:13px}
.info-linje:last-child{margin-bottom:0}
.info-ikon{font-size:14px;flex-shrink:0;margin-top:1px;width:18px}
.info-tekst{line-height:1.4;word-break:break-word;color:var(--tekst)}
.info-tekst a{color:var(--gron);text-decoration:none}
.info-tekst a:hover{text-decoration:underline}
.tom-info{color:var(--tekst-lys);font-style:italic}

.familie-sektion{margin-top:.8rem;padding-top:.8rem;border-top:1px solid var(--border)}
.familie-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tekst-lys);font-weight:600;margin-bottom:.4rem}
.familie-liste{font-size:12.5px;color:var(--tekst);line-height:1.7}

.kort-fod{padding:.6rem 1rem;border-top:1px solid var(--border);background:var(--guld-pale);display:flex;justify-content:flex-end}
.rediger-knap{background:none;border:1px solid var(--gron);color:var(--gron);font-size:11px;letter-spacing:.5px;padding:5px 14px;cursor:pointer;font-family:'Source Sans 3',sans-serif;font-weight:600;transition:all .2s;border-radius:3px;display:none}
.rediger-knap:hover{background:var(--gron);color:var(--hvid)}
body.er-admin .rediger-knap{display:inline-block}

/* ── REDIGÉR FORM ── */
.edit-form{padding:1rem 1rem .75rem;background:#f5f0e4}
.edit-felt{margin-bottom:.75rem}
.edit-felt label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tekst-lys);font-weight:600;margin-bottom:4px}
.edit-felt input,.edit-felt textarea{width:100%;border:1px solid var(--border);padding:.5rem .75rem;font-size:13px;font-family:'Source Sans 3',sans-serif;color:var(--tekst);background:var(--hvid);outline:none;border-radius:3px;transition:border-color .2s}
.edit-felt input:focus,.edit-felt textarea:focus{border-color:var(--gron);background:#fff}
.edit-felt textarea{min-height:68px;resize:vertical;line-height:1.5}
.edit-knapper{display:flex;align-items:center;gap:.5rem;margin-top:.75rem}
.gem-knap{background:var(--gron);color:var(--hvid);border:none;padding:7px 18px;font-size:12px;letter-spacing:.5px;font-weight:600;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-radius:3px;transition:background .2s}
.gem-knap:hover{background:var(--gron-lys)}
.gem-knap:disabled{opacity:.6;cursor:default}
.annuller-knap{background:none;border:1px solid var(--border);color:var(--tekst-lys);padding:7px 14px;font-size:12px;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-radius:3px;transition:all .2s}
.annuller-knap:hover{border-color:var(--tekst);color:var(--tekst)}
.gem-status{font-size:12px;margin-right:auto}
.gem-status.ok{color:var(--ok)}
.gem-status.fejl{color:var(--fare)}

/* ── LOGIN MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1000;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.vis{display:flex}
.modal-boks{background:var(--hvid);max-width:380px;width:100%;border-top:3px solid var(--guld);box-shadow:0 20px 60px rgba(0,0,0,.35);position:relative}
.modal-luk{position:absolute;top:.75rem;right:1rem;background:none;border:none;font-size:22px;cursor:pointer;color:var(--tekst-lys);line-height:1;padding:0}
.modal-luk:hover{color:var(--tekst)}
.modal-header{padding:1.75rem 1.75rem 0}
.modal-titel{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:var(--gron)}
.modal-body{padding:1.25rem 1.75rem 1.75rem}
.modal-felt{margin-bottom:1rem}
.modal-felt label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tekst-lys);font-weight:600;margin-bottom:5px}
.modal-felt input{width:100%;border:1px solid rgba(200,149,42,.35);padding:.65rem .9rem;font-size:14px;font-family:'Source Sans 3',sans-serif;color:var(--tekst);background:#faf6ee;outline:none;border-radius:3px;transition:border-color .2s}
.modal-felt input:focus{border-color:var(--gron);background:#fff}
.modal-login-knap{width:100%;background:var(--gron);color:var(--hvid);border:none;padding:.75rem;font-size:12px;letter-spacing:1.5px;font-weight:600;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-radius:3px;transition:background .2s;margin-top:.25rem}
.modal-login-knap:hover{background:var(--gron-lys)}
.modal-fejl{color:var(--fare);font-size:12px;margin-top:.6rem;display:none}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .topbar-links{display:none}
  .grid{grid-template-columns:1fr}
  .soege-input{min-width:160px}
}

function adrHtml(s) {
  return (s || '').split('\n').map(l => l.trim()).filter(Boolean).join('<br>');
}

function visKortHtml(m) {
  const adr = adrHtml(m.adresse);
  const familieLinjer = (m.familie || '').split('\n').map(l => l.trim()).filter(Boolean);
  const familieHtml = familieLinjer.length

    <div class="kort-hoved">

  const grid = document.getElementById('grid');
  const q = soegeTekst.toLowerCase();
  const synlige = data
    .filter(m =>
      !q ||
      m.navne.toLowerCase().includes(q) ||
      (m.adresse || '').toLowerCase().includes(q) ||
      (m.tlf || '').includes(q) ||
      (m.familie || '').toLowerCase().includes(q)
    )
    .sort((a, b) => +a.nr - +b.nr);

  const antalEl = document.getElementById('antal-linje');
  antalEl.textContent = synlige.length === data.length
    ? `${data.length} familier`
    : `${synlige.length} af ${data.length} familier`;

  grid.innerHTML = '';
  if (!synlige.length) {
    grid.innerHTML = '<div class="ingen-resultater">Ingen familier matcher søgningen.</div>';
    return;
  }
  synlige.forEach(m => {
    const el = document.createElement('div');
    el.className = 'kort';
    el.dataset.nr = m.nr;
    el.innerHTML = visKortHtml(m);
    grid.appendChild(el);
  });
}

// ── EDIT ──────────────────────────────────────────────────────
function aabneRedigering(nr) {
  const m = data.find(x => x.nr === nr);
  const el = document.querySelector(`.kort[data-nr="${nr}"]`);
  if (!m || !el) return;
  el.innerHTML = visEditHtml(m);
  el.querySelector('#ef-navne').focus();
}

function annullerRedigering(nr) {
  const m = data.find(x => x.nr === nr);
  const el = document.querySelector(`.kort[data-nr="${nr}"]`);
  if (!m || !el) return;
  el.innerHTML = visKortHtml(m);
}

async function gemRedigering(gammelNr) {
  const nytNr    = document.getElementById('ef-nr').value.trim();
  const statusEl = document.getElementById(`gem-status-${gammelNr}`);
  const gemKnap  = document.getElementById(`gem-knap-${gammelNr}`);

  if (!nytNr) {
    statusEl.className = 'gem-status fejl';
    statusEl.textContent = 'Medlemsnummer må ikke være tomt.';
    return;
  }

  const opdateret = {
    nr:      nytNr,
    navne:   document.getElementById('ef-navne').value.trim(),
    adresse: document.getElementById('ef-adresse').value.trim(),
    tlf:     document.getElementById('ef-tlf').value.trim(),
    email:   document.getElementById('ef-email').value.trim(),
    familie: document.getElementById('ef-familie').value.trim(),
  };

  gemKnap.disabled = true;
  statusEl.className = 'gem-status';
  statusEl.textContent = 'Gemmer…';

  try {
    // Gem/overskriv i Firestore
    await setDoc(doc(db, 'medlemmer', nytNr), opdateret);

    // Slet gammelt dokument hvis nummer er ændret
    if (nytNr !== gammelNr) {
      await deleteDoc(doc(db, 'medlemmer', gammelNr));
    }

    // Opdatér lokal state
    const idx = data.findIndex(x => x.nr === gammelNr);
    if (idx >= 0) data[idx] = opdateret;
    else data.push(opdateret);

    // Re-render kortet i visnings-mode
    const el = document.querySelector(`.kort[data-nr="${gammelNr}"]`);
    if (el) {
      el.dataset.nr = nytNr;
      el.innerHTML = visKortHtml(opdateret);
    }
  } catch (e) {
    gemKnap.disabled = false;
    statusEl.className = 'gem-status fejl';
    statusEl.textContent = 'Fejl: ' + (e.message || 'Kunne ikke gemme');
  }
}

// ── EVENT DELEGATION ──────────────────────────────────────────
document.getElementById('grid').addEventListener('click', e => {
  const rBtn = e.target.closest('.rediger-knap');
  if (rBtn) { aabneRedigering(rBtn.dataset.nr); return; }

  const aBtn = e.target.closest('[data-annuller]');
  if (aBtn) { annullerRedigering(aBtn.dataset.annuller); return; }

  const gBtn = e.target.closest('[data-gem]');
  if (gBtn) { gemRedigering(gBtn.dataset.gem); return; }
});

// ── SØGNING ───────────────────────────────────────────────────
document.getElementById('soege').addEventListener('input', e => {
  soegeTekst = e.target.value;
  renderGrid();
});

// ── AUTH ──────────────────────────────────────────────────────
async function erAdministrator(user) {
  if (!user) return false;
  try {
    const snap = await getDoc(doc(db, 'brugere', user.uid));
    return snap.exists() && snap.data().rolle === 'administrator';
  } catch { return false; }
}

onAuthStateChanged(auth, async user => {
  const badge    = document.getElementById('admin-badge');
  const loginKnap = document.getElementById('login-knap');

  if (user && await erAdministrator(user)) {
    document.body.classList.add('er-admin');
    document.getElementById('admin-email').textContent = user.email;
    badge.style.display = 'flex';
    loginKnap.style.display = 'none';
  } else {
    document.body.classList.remove('er-admin');
    badge.style.display = 'none';
    loginKnap.style.display = 'inline-block';
  }
});

// ── LOGIN MODAL ───────────────────────────────────────────────
const modal     = document.getElementById('login-modal');
const modalFejl = document.getElementById('modal-fejl');

document.getElementById('login-knap').addEventListener('click', () => {
  modalFejl.style.display = 'none';
  modal.classList.add('vis');
  setTimeout(() => document.getElementById('modal-email').focus(), 80);
});
document.getElementById('modal-luk').addEventListener('click', () => modal.classList.remove('vis'));
modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('vis'); });

document.getElementById('modal-login-knap').addEventListener('click', async () => {
  const email = document.getElementById('modal-email').value.trim();
  const kode  = document.getElementById('modal-kode').value;
  modalFejl.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, kode);
    modal.classList.remove('vis');
  } catch {
    modalFejl.style.display = 'block';
  }
});

document.getElementById('modal-kode').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modal-login-knap').click();
});

document.getElementById('log-ud-knap').addEventListener('click', () => signOut(auth));

// ── INDLÆSNING ────────────────────────────────────────────────
async function initialiserSide() {
  renderGrid(); // Vis standarddata straks

  try {
    const snap = await getDocs(collection(db, 'medlemmer'));
    snap.forEach(d => {
      const fd = d.data();
      const idx = data.findIndex(x => x.nr === d.id);
      if (idx >= 0) data[idx] = { ...data[idx], ...fd };
      else data.push(fd);
    });
    renderGrid(); // Opdatér med Firestore-data hvis tilgængeligt
  } catch { /* Firestore ikke tilgængeligt – standarddata vises */ }
}

initialiserSide();
</script>
