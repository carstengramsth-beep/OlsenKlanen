<title>OlsenKlanen — Medlemskartotek</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --gron:#2d5016;--gron-lys:#4a7c2a;--gron-pale:#c8e6b0;
  --guld:#c8952a;--guld-lys:#f5e6c8;--guld-pale:#fdf8ee;
  --hvid:#fefcf8;--tekst:#1a1a0e;--tekst-lys:#5a5a40;--border:#d4c9a0;
  --baggrund:#fffde0;
  --fare:#c0392b;--fare-pale:#fdf0ef;--ok:#2d6e2d;--ok-pale:#e8f5e9;
}
body{font-family:'Source Sans 3',sans-serif;background:var(--baggrund);color:var(--tekst);min-height:100vh}

/* ── FLAG-BANNER ── */
.flag-banner{background:var(--gron);text-align:center;padding:.55rem 0;font-size:26px;letter-spacing:6px;border-bottom:3px solid var(--guld)}

/* ── TOPBAR ── */
.topbar{background:var(--gron);padding:0 1.5rem;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-logo{font-family:'Playfair Display',serif;font-size:19px;font-weight:500;color:var(--hvid);text-decoration:none}
.topbar-hojre{display:flex;align-items:center;gap:1.5rem}
.topbar-links{display:flex;gap:1.25rem}
.topbar-links a{font-size:12px;color:rgba(255,255,255,.6);text-decoration:none}
.topbar-links a:hover,.topbar-links a.aktiv{color:var(--guld-lys)}
#login-knap{background:none;border:1px solid rgba(255,255,255,.35);color:rgba(255,255,255,.75);font-size:11px;letter-spacing:1px;padding:5px 13px;cursor:pointer;font-family:'Source Sans 3',sans-serif;transition:all .2s;border-radius:2px}
#login-knap:hover{border-color:var(--guld-lys);color:var(--guld-lys)}
#bruger-info{display:none;align-items:center;gap:.75rem}
#bruger-rolle{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:2px;font-weight:700}
#bruger-rolle.administrator{background:var(--guld);color:var(--tekst)}
#bruger-rolle.redaktør{background:rgba(255,255,255,.2);color:var(--hvid)}
#bruger-email{font-size:11px;color:rgba(255,255,255,.6)}
#log-ud-knap{background:none;border:none;color:rgba(255,255,255,.4);font-size:11px;cursor:pointer;padding:0;font-family:'Source Sans 3',sans-serif;transition:color .2s}
#log-ud-knap:hover{color:var(--fare)}

/* ── SIDE-HEADER ── */
.side-header{background:var(--gron);padding:1.75rem 1rem 1.5rem;text-align:center;border-bottom:1px solid rgba(200,149,42,.35)}
.side-header h1{font-family:'Playfair Display',serif;font-size:clamp(22px,5vw,36px);font-weight:400;color:var(--hvid);margin-bottom:.3rem}
.side-header p{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1px}
.guld-streg{width:40px;height:2px;background:var(--guld);margin:.9rem auto 0;border-radius:2px}

/* ── WRAPPER ── */
.wrapper{max-width:1120px;margin:0 auto;padding:1.5rem 1rem 3rem}

/* ── SØGEBAR ── */
.soegebar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap}
.soege-input{flex:1;min-width:220px;border:1px solid var(--border);background:var(--hvid);padding:.6rem 1rem;font-size:14px;font-family:'Source Sans 3',sans-serif;color:var(--tekst);outline:none;border-radius:4px;transition:border-color .2s}
.soege-input:focus{border-color:var(--gron)}
.antal-linje{font-size:12px;color:var(--tekst-lys);white-space:nowrap}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem}
.ingen-resultater{grid-column:1/-1;text-align:center;padding:3rem 1rem;color:var(--tekst-lys);font-style:italic}

/* ── KORT ── */
.kort{background:var(--hvid);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);display:flex;flex-direction:column;transition:box-shadow .2s}
.kort:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}

.kort-hoved{background:var(--gron);padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;cursor:pointer;user-select:none}
.nr-badge{background:var(--guld);color:var(--tekst);font-size:10px;font-weight:700;padding:3px 8px;border-radius:3px;white-space:nowrap;flex-shrink:0;letter-spacing:.5px}
.kort-navn{font-family:'Playfair Display',serif;font-size:15px;font-weight:400;color:var(--hvid);line-height:1.3;flex:1}
.expand-pil{color:rgba(255,255,255,.5);font-size:13px;flex-shrink:0;transition:transform .25s}
.kort.udvidet .expand-pil{transform:rotate(180deg)}

.kort-krop{padding:1rem;flex:1;cursor:pointer}
.info-linje{display:flex;gap:.65rem;align-items:flex-start;margin-bottom:.65rem;font-size:13px}
.info-linje:last-child{margin-bottom:0}
.info-ikon{font-size:14px;flex-shrink:0;margin-top:1px;width:18px}
.info-tekst{line-height:1.4;word-break:break-word;color:var(--tekst)}
.info-tekst a{color:var(--gron);text-decoration:none}
.info-tekst a:hover{text-decoration:underline}
.tom-info{color:var(--tekst-lys);font-style:italic}

/* Familie-sektion: skjult som standard, vist når kort er udvidet */
.familie-sektion{overflow:hidden;max-height:0;transition:max-height .3s ease,padding .3s ease;padding:0 1rem;cursor:pointer}
.kort.udvidet .familie-sektion{max-height:600px;padding:.75rem 1rem}
.familie-label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tekst-lys);font-weight:600;margin-bottom:.5rem}
.familie-liste{font-size:13px;color:var(--tekst);line-height:1.8}
.familie-tom{font-size:12px;color:var(--tekst-lys);font-style:italic}
.familie-separator{border:none;border-top:1px solid var(--border);margin:0}

/* Fod: klik-hint + rediger-knap */
.kort-fod{padding:.65rem 1rem;border-top:1px solid var(--border);background:var(--guld-pale);display:flex;align-items:center;justify-content:space-between;gap:.5rem}
.klik-hint{font-size:11px;color:var(--tekst-lys);font-style:italic;cursor:pointer}
.kort.udvidet .klik-hint{display:none}

.rediger-knap{background:var(--gron);color:var(--hvid);border:none;font-size:12px;font-weight:700;letter-spacing:.5px;padding:7px 16px;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-radius:4px;transition:background .2s;display:none;flex-shrink:0}
.rediger-knap:hover{background:var(--gron-lys)}
body.kan-redigere .rediger-knap{display:inline-block}

/* ── REDIGERINGS-MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.modal-overlay.vis{display:flex}

/* Login-modal */
#login-modal .modal-boks{background:var(--hvid);max-width:400px;width:100%;border-top:3px solid var(--guld);box-shadow:0 20px 60px rgba(0,0,0,.35);position:relative;margin:auto}
.modal-luk{position:absolute;top:.75rem;right:1rem;background:none;border:none;font-size:24px;cursor:pointer;color:var(--tekst-lys);line-height:1;padding:2px 6px;transition:color .2s}
.modal-luk:hover{color:var(--tekst)}
.modal-header{padding:1.75rem 1.75rem 0}
.modal-titel{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:var(--gron)}
.modal-body{padding:1.25rem 1.75rem 1.75rem}
.modal-felt{margin-bottom:1rem}
.modal-felt label{display:block;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--tekst-lys);font-weight:600;margin-bottom:5px}
.modal-felt input{width:100%;border:1px solid rgba(200,149,42,.35);padding:.65rem .9rem;font-size:14px;font-family:'Source Sans 3',sans-serif;color:var(--tekst);background:#faf6ee;outline:none;border-radius:3px;transition:border-color .2s}
.modal-felt input:focus{border-color:var(--gron);background:#fff}
.modal-login-knap{width:100%;background:var(--gron);color:var(--hvid);border:none;padding:.75rem;font-size:12px;letter-spacing:1.5px;font-weight:700;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-radius:3px;transition:background .2s;margin-top:.25rem}
.modal-login-knap:hover{background:var(--gron-lys)}
.modal-fejl{color:var(--fare);font-size:12px;margin-top:.6rem;display:none}

/* Redigerings-modal */
#edit-modal .edit-boks{background:var(--hvid);max-width:560px;width:100%;border-top:4px solid var(--gron);box-shadow:0 24px 70px rgba(0,0,0,.4);position:relative;margin:auto;border-radius:0 0 8px 8px}
.edit-modal-header{background:var(--gron);padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.edit-modal-titel{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:var(--hvid);line-height:1.3}
.edit-modal-luk{background:none;border:none;font-size:24px;cursor:pointer;color:rgba(255,255,255,.6);line-height:1;padding:2px 6px;flex-shrink:0;transition:color .2s}
.edit-modal-luk:hover{color:var(--hvid)}
.edit-modal-krop{padding:1.5rem}

.ef-felt{margin-bottom:1.1rem}
.ef-felt label{display:block;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tekst-lys);font-weight:700;margin-bottom:5px}
.ef-felt input,.ef-felt textarea{width:100%;border:1px solid var(--border);padding:.55rem .85rem;font-size:13.5px;font-family:'Source Sans 3',sans-serif;color:var(--tekst);background:#faf8f2;outline:none;border-radius:4px;transition:border-color .2s}
.ef-felt input:focus,.ef-felt textarea:focus{border-color:var(--gron);background:#fff}
.ef-felt textarea{min-height:72px;resize:vertical;line-height:1.55}

/* Familiemedlemmer-liste */
.familie-overskrift{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--tekst-lys);font-weight:700;margin-bottom:.6rem}
.familie-liste-edit{display:flex;flex-direction:column;gap:.4rem;margin-bottom:.75rem}
.familie-rad{display:flex;align-items:center;gap:.5rem;background:#f5f0e4;border:1px solid var(--border);border-radius:4px;padding:.4rem .5rem .4rem .75rem}
.familie-rad-navn{flex:1;font-size:13px;color:var(--tekst)}
.familie-slet{background:none;border:none;color:var(--tekst-lys);font-size:18px;cursor:pointer;line-height:1;padding:0 4px;transition:color .2s;flex-shrink:0}
.familie-slet:hover{color:var(--fare)}
.familie-tilfoej-rad{display:flex;gap:.5rem}
.familie-ny-input{flex:1;border:1px solid var(--border);padding:.5rem .75rem;font-size:13px;font-family:'Source Sans 3',sans-serif;color:var(--tekst);background:#faf8f2;outline:none;border-radius:4px;transition:border-color .2s}
.familie-ny-input:focus{border-color:var(--gron);background:#fff}
.familie-tilfoej-knap{background:var(--gron);color:var(--hvid);border:none;padding:.5rem 1rem;font-size:12px;font-weight:700;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-radius:4px;white-space:nowrap;transition:background .2s}
.familie-tilfoej-knap:hover{background:var(--gron-lys)}

.edit-modal-fod{padding:1rem 1.5rem;border-top:1px solid var(--border);background:var(--guld-pale);display:flex;align-items:center;gap:.75rem;border-radius:0 0 8px 8px}
.edit-gem-knap{background:var(--gron);color:var(--hvid);border:none;padding:9px 24px;font-size:13px;letter-spacing:.5px;font-weight:700;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-radius:4px;transition:background .2s}
.edit-gem-knap:hover{background:var(--gron-lys)}
.edit-gem-knap:disabled{opacity:.6;cursor:default}
.edit-annuller-knap{background:none;border:1px solid var(--border);color:var(--tekst-lys);padding:9px 18px;font-size:13px;cursor:pointer;font-family:'Source Sans 3',sans-serif;border-radius:4px;transition:all .2s}
.edit-annuller-knap:hover{border-color:var(--tekst);color:var(--tekst)}
.edit-gem-status{font-size:12px;margin-left:auto}
.edit-gem-status.ok{color:var(--ok)}
.edit-gem-status.fejl{color:var(--fare)}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .topbar-links{display:none}
  .grid{grid-template-columns:1fr}
  .soege-input{min-width:160px}
  #bruger-email{display:none}
  .modal-overlay{padding:1rem .5rem}
}

// ── STATE ─────────────────────────────────────────────────────
let data = STANDARD.map(m => ({...m}));
let soegeTekst = '';
let aktivtRedigerNr = null;   // Hvilket kort er åbent i edit-modal
let familieLinjer = [];        // Arbejdskopi af familie-listen i modalen

// ── KORTRENDERER ──────────────────────────────────────────────
function adrHtml(s) {
  return (s || '').split('\n').map(l => l.trim()).filter(Boolean).join('<br>');
}

function byggKort(m) {
  const el = document.createElement('div');
  el.className = 'kort';
  el.dataset.nr = m.nr;

  const familieLinjer = (m.familie || '').split('\n').map(l => l.trim()).filter(Boolean);
  const harFamilie = familieLinjer.length > 0;

  const familieIndhold = harFamilie
    ? familieLinjer.map(n => `<div>${n}</div>`).join('')
    : '<div class="familie-tom">Ingen familiemedlemmer registreret</div>';

  const emailLinjer = (m.email || '').split('/').map(e => e.trim()).filter(Boolean);
  const emailHtml = emailLinjer.length
    ? emailLinjer.map(e => `<a href="mailto:${e}">${e}</a>`).join('<br>')
    : '<span class="tom-info">Ingen email</span>';

  el.innerHTML = `
    <div class="kort-hoved">
      <span class="nr-badge">Mdl. nr. ${m.nr}</span>
      <span class="kort-navn">${m.navne}</span>
      <span class="expand-pil">▾</span>
    </div>
    <div class="kort-krop">
      <div class="info-linje">
        <span class="info-ikon">📍</span>
        <span class="info-tekst">${adrHtml(m.adresse) || '<span class="tom-info">Ingen adresse</span>'}</span>
      </div>
      <div class="info-linje">
        <span class="info-ikon">📞</span>
        <span class="info-tekst">${m.tlf || '<span class="tom-info">Ingen telefon</span>'}</span>
      </div>
      <div class="info-linje">
        <span class="info-ikon">✉️</span>
        <span class="info-tekst">${emailHtml}</span>
      </div>
    </div>
    <hr class="familie-separator">
    <div class="familie-sektion">
      <div class="familie-label">👨‍👩‍👧 Familiemedlemmer</div>
      <div class="familie-liste">${familieIndhold}</div>
    </div>
    <div class="kort-fod">
      <span class="klik-hint">▾ Klik for at se familiemedlemmer</span>
      <button class="rediger-knap" data-nr="${m.nr}">✏️ Rediger</button>
    </div>`;

  return el;
}

// ── GRID-RENDER ───────────────────────────────────────────────
function renderGrid() {
  const grid = document.getElementById('grid');
  const q = soegeTekst.toLowerCase();
  const synlige = data
    .filter(m =>
      !q ||
      m.navne.toLowerCase().includes(q) ||
      (m.adresse || '').toLowerCase().includes(q) ||
      (m.tlf || '').includes(q) ||
      (m.familie || '').toLowerCase().includes(q)
    )
    .sort((a, b) => +a.nr - +b.nr);

  document.getElementById('antal-linje').textContent = synlige.length === data.length
    ? `${data.length} familier`
    : `${synlige.length} af ${data.length} familier`;

  grid.innerHTML = '';
  if (!synlige.length) {
    grid.innerHTML = '<div class="ingen-resultater">Ingen familier matcher søgningen.</div>';
    return;
  }
  synlige.forEach(m => grid.appendChild(byggKort(m)));
}

// ── EXPAND/COLLAPSE VED KORTKLIK ──────────────────────────────
document.getElementById('grid').addEventListener('click', e => {
  // Rediger-knap: åbn modal, lad ikke expand ske
  const rBtn = e.target.closest('.rediger-knap');
  if (rBtn) {
    e.stopPropagation();
    aabneEditModal(rBtn.dataset.nr);
    return;
  }

  // Email-link: lad browseren håndtere det
  if (e.target.closest('a')) return;

  // Alt andet på kortet: toggle expand
  const kort = e.target.closest('.kort');
  if (kort) kort.classList.toggle('udvidet');
});

// ── REDIGERINGS-MODAL ─────────────────────────────────────────
const editModal    = document.getElementById('edit-modal');
const editStatusEl = document.getElementById('edit-gem-status');
const editGemKnap  = document.getElementById('edit-gem-knap');

function familieRadHtml(navn, idx) {
  return `<div class="familie-rad" data-idx="${idx}">
    <span class="familie-rad-navn">${navn}</span>
    <button class="familie-slet" data-slet="${idx}" aria-label="Fjern">×</button>
  </div>`;
}

function renderFamilieListeEdit() {
  document.getElementById('familie-liste-edit').innerHTML =
    familieLinjer.map((n, i) => familieRadHtml(n, i)).join('') ||
    '<div style="font-size:12px;color:var(--tekst-lys);font-style:italic;margin-bottom:.4rem">Ingen endnu — tilføj nedenfor</div>';
}

function aabneEditModal(nr) {
  const m = data.find(x => x.nr === nr);
  if (!m) return;
  aktivtRedigerNr = nr;
  familieLinjer = (m.familie || '').split('\n').map(l => l.trim()).filter(Boolean);

  document.getElementById('edit-modal-titel').textContent = `Rediger — ${m.navne}`;
  document.getElementById('ef-nr').value      = m.nr;
  document.getElementById('ef-navne').value   = m.navne;
  document.getElementById('ef-adresse').value = m.adresse || '';
  document.getElementById('ef-tlf').value     = m.tlf || '';
  document.getElementById('ef-email').value   = m.email || '';
  document.getElementById('familie-ny-input').value = '';
  editStatusEl.textContent = '';
  editStatusEl.className = 'edit-gem-status';
  editGemKnap.disabled = false;

  renderFamilieListeEdit();
  editModal.classList.add('vis');
  setTimeout(() => document.getElementById('ef-navne').focus(), 80);
}

function lukkeEditModal() {
  editModal.classList.remove('vis');
  aktivtRedigerNr = null;
}

// Klik på × ved et familiemedlem
document.getElementById('familie-liste-edit').addEventListener('click', e => {
  const sletKnap = e.target.closest('[data-slet]');
  if (!sletKnap) return;
  familieLinjer.splice(+sletKnap.dataset.slet, 1);
  renderFamilieListeEdit();
});

// Tilføj nyt familiemedlem
function tilfoejFamilieMedlem() {
  const input = document.getElementById('familie-ny-input');
  const navn = input.value.trim();
  if (!navn) return;
  familieLinjer.push(navn);
  input.value = '';
  renderFamilieListeEdit();
  input.focus();
}

document.getElementById('familie-tilfoej-knap').addEventListener('click', tilfoejFamilieMedlem);
document.getElementById('familie-ny-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); tilfoejFamilieMedlem(); }
});

// Gem
editGemKnap.addEventListener('click', async () => {
  const gammelNr = aktivtRedigerNr;
  const nytNr    = document.getElementById('ef-nr').value.trim();

  if (!nytNr) {
    editStatusEl.className = 'edit-gem-status fejl';
    editStatusEl.textContent = 'Medlemsnummer må ikke være tomt.';
    return;
  }

  const opdateret = {
    nr:      nytNr,
    navne:   document.getElementById('ef-navne').value.trim(),
    adresse: document.getElementById('ef-adresse').value.trim(),
    tlf:     document.getElementById('ef-tlf').value.trim(),
    email:   document.getElementById('ef-email').value.trim(),
    familie: familieLinjer.join('\n'),
  };

  editGemKnap.disabled = true;
  editStatusEl.className = 'edit-gem-status';
  editStatusEl.textContent = 'Gemmer…';

  try {
    await setDoc(doc(db, 'medlemmer', nytNr), opdateret);
    if (nytNr !== gammelNr) await deleteDoc(doc(db, 'medlemmer', gammelNr));

    const idx = data.findIndex(x => x.nr === gammelNr);
    if (idx >= 0) data[idx] = opdateret;
    else data.push(opdateret);

    renderGrid();
    lukkeEditModal();
  } catch (err) {
    editGemKnap.disabled = false;
    editStatusEl.className = 'edit-gem-status fejl';
    editStatusEl.textContent = 'Fejl: ' + (err.message || 'Kunne ikke gemme');
  }
});

document.getElementById('edit-annuller-knap').addEventListener('click', lukkeEditModal);
document.getElementById('edit-modal-luk').addEventListener('click', lukkeEditModal);
editModal.addEventListener('click', e => { if (e.target === editModal) lukkeEditModal(); });

// ── SØGNING ───────────────────────────────────────────────────
document.getElementById('soege').addEventListener('input', e => {
  soegeTekst = e.target.value;
  renderGrid();
});

// ── AUTH: administrator OG redaktør kan redigere ──────────────
async function hentRolle(user) {
  if (!user) return null;
  try {
    const snap = await getDoc(doc(db, 'brugere', user.uid));
    return snap.exists() ? (snap.data().rolle || null) : null;
  } catch { return null; }
}

onAuthStateChanged(auth, async user => {
  const brugerInfo = document.getElementById('bruger-info');
  const loginKnap  = document.getElementById('login-knap');

  if (user) {
    const rolle = await hentRolle(user);
    if (rolle === 'administrator' || rolle === 'redaktør') {
      document.body.classList.add('kan-redigere');
      document.getElementById('bruger-rolle').textContent = rolle.charAt(0).toUpperCase() + rolle.slice(1);
      document.getElementById('bruger-rolle').className = 'bruger-rolle ' + rolle;
      document.getElementById('bruger-email').textContent = user.email;
      brugerInfo.style.display = 'flex';
      loginKnap.style.display = 'none';
      return;
    }
  }

  document.body.classList.remove('kan-redigere');
  brugerInfo.style.display = 'none';
  loginKnap.style.display = 'inline-block';
});

// ── LOGIN MODAL ───────────────────────────────────────────────
const loginModal = document.getElementById('login-modal');
const modalFejl  = document.getElementById('modal-fejl');

document.getElementById('login-knap').addEventListener('click', () => {
  modalFejl.style.display = 'none';
  loginModal.classList.add('vis');
  setTimeout(() => document.getElementById('modal-email').focus(), 80);
});
document.getElementById('modal-luk').addEventListener('click', () => loginModal.classList.remove('vis'));
loginModal.addEventListener('click', e => { if (e.target === loginModal) loginModal.classList.remove('vis'); });

document.getElementById('modal-login-knap').addEventListener('click', async () => {
  const email = document.getElementById('modal-email').value.trim();
  const kode  = document.getElementById('modal-kode').value;
  modalFejl.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, kode);
    loginModal.classList.remove('vis');
  } catch {
    modalFejl.style.display = 'block';
  }
});
document.getElementById('modal-kode').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('modal-login-knap').click();
});
document.getElementById('log-ud-knap').addEventListener('click', () => signOut(auth));

// ── INDLÆSNING ────────────────────────────────────────────────
async function initialiserSide() {
  renderGrid();
  try {
    const snap = await getDocs(collection(db, 'medlemmer'));
    snap.forEach(d => {
      const fd = d.data();
      const idx = data.findIndex(x => x.nr === d.id);
      if (idx >= 0) data[idx] = { ...data[idx], ...fd };
      else data.push(fd);
    });
    renderGrid();
  } catch { /* standarddata vises */ }
}

initialiserSide();
</script>
